{% extends "layout.html" %}

{% block title %}Signup{% endblock %}
{% block page %}Signup{% endblock %}

{% block link%}
    <ul id="nav-mobile" class="right">
        <li><a href="/login">Login</a></li>
    </ul>
{% endblock %}

{% block content %}
<main class="container" style="margin-top: 100px">
   <form class="card col s12" id="signupForm" method="POST" action="/signup" style="padding:1em">
      
      <div class="row">
        <div class="input-field col s12">
          <input placeholder="Enter your email" name="email" type="email" class="validate" required>
          <label for="email">Email</label>
        </div>
      </div>
      
      <div class="row">
        <div class="input-field col s12">
          <input placeholder="Choose a username" name="username" type="text" class="validate" required>
          <label for="username">Username</label>
        </div>
      </div>
      
      <div class="row">
        <div class="input-field col s12">
          <input name="password" type="password" class="validate" required>
          <label for="password">Password</label>
        </div>
      </div>
      
      <div class="card-action">
        <input type="submit" class="blue text-white btn" value="Sign Up">
      </div>
  </form>
</main>
{% endblock %}
